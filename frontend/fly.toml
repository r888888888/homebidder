# fly.toml — deploy the React/TanStack Start frontend
# Run `fly launch` then `fly deploy` from the ./frontend directory.

app = "homebidder-web"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  [build.args]
    VITE_API_URL = "https://homebidder-api.fly.dev"

[env]
  PORT = "3000"

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0

[[vm]]
  memory = "512mb"
  cpu_kind = "shared"
  cpus = 1
